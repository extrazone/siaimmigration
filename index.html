
<!DOCTYPE html><html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon_io">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIA - Launching Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  text-align:center;
  overflow:hidden;
}
  <h1>SIA IMMIGRATION & TRAVEL HUB </h1>

/* ANIMATED GRADIENT BACKGROUND */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#ff416c,#ff4b2b);
  background-size:1000% 1000%;
  animation:gradientMove 15s ease infinite;
  z-index:-2;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* FLOATING PARTICLES */
.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  animation:float 10s infinite ease-in-out;
}

.circle:nth-child(1){width:80px;height:80px;top:20%;left:10%}
.circle:nth-child(2){width:120px;height:120px;top:70%;left:80%}
.circle:nth-child(3){width:60px;height:60px;top:50%;left:30%}
.circle:nth-child(4){width:100px;height:100px;top:10%;left:70%}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-30px)}
}

.container{
  max-width:600px;
  padding:20px;
}

.logo{
  width:220px;
  margin-bottom:20px;
  animation:fadeIn 2s ease;
}

h1{
  font-size:2.8rem;
  margin-bottom:10px;
  animation:fadeInUp 1.5s ease;
}

p{
  opacity:.85;
  margin-bottom:25px;
  animation:fadeInUp 2s ease;
}

.countdown{
  display:flex;
  justify-content:center;
  gap:15px;
}

.time-box{
  background:rgba(0,0,0,0.3);
  padding:15px 18px;
  border-radius:10px;
  backdrop-filter:blur(10px);
}

.time-box span{
  font-size:1.5rem;
  font-weight:600;
}

footer{
  margin-top:25px;
  opacity:.6;
  font-size:.9rem;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

</style></head><body><!-- Floating Shapes --><div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div><div class="container">
  <video class="logo" autoplay muted loop playsinline>
  <source src="sia .mp4" type="video/mp4">
</video>  <h1>Launching Soon 🚀</h1>
  <p>We are building something amazing for your immigration & travel needs.</p>  <div class="countdown">
    <div class="time-box"><span id="days">00</span><br><small>Days</small></div>
    <div class="time-box"><span id="hours">00</span><br><small>Hours</small></div>
    <div class="time-box"><span id="minutes">00</span><br><small>Minutes</small></div>
    <div class="time-box"><span id="seconds">00</span><br><small>Seconds</small></div>
  </div>  <footer>© 2026 SIA Immigration & Travel Hub</footer>
</div><script>
const launchDate = new Date("2026-05-05T00:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const d = launchDate - now;

  document.getElementById("days").innerText = Math.floor(d/(1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  document.getElementById("minutes").innerText = Math.floor((d%(1000*60*60))/(1000*60));
  document.getElementById("seconds").innerText = Math.floor((d%(1000*60))/1000);
},1000);
</script></body>
</html>
